# CI pipeline for the student wellbeing dashboard
# Runs on pushes to main and feature branches, and on all pull requests

name: CI

on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]
        # Pin to Node 18 to match CRA/react-scripts compatibility

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm audit --audit-level=high
      - run: CI=true npm test -- --watchAll=false
      - run: npm run build

  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm audit --audit-level=high
        working-directory: backend
      - run: npm test -- --coverage
        working-directory: backend
        env:
          NODE_ENV: test
          PGPASSWORD: test
          SESSION_SECRET: test-secret-for-ci
