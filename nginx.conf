server {
    # Serve the built React app
    listen       80;
    server_name  localhost;

    # Static bundle location created by the build stage
    root   /usr/share/nginx/html;
    index  index.html;

    # SPA: let client-side router handle deep links by falling back to index.html
    location / {
        try_files $uri /index.html;
    }

    # Cache static assets aggressively (hashes in filenames prevent stale content)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public";
    }
}



